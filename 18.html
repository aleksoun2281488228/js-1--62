<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Чеклист</title>
    <style>
        body {
            text-align: center;
            font-family: Arial, sans-serif;
        }
        #input, #list {
            display: inline-block;
        }
        #list {
            padding: 0;
            list-style-type: none;
            text-align: left;
            min-width: 300px;
        }
        #list li {
            margin: 8px 0;
            padding: 8px;
            background: #f5f5f5;
            border-radius: 5px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .task-text {
            flex: 1;
            cursor: pointer;
        }
        .done {
            text-decoration: line-through;
            color: gray;
        }
        button {
            margin-left: 8px;
            padding: 5px 10px;
            cursor: pointer;
            border: 1px solid #999;
            border-radius: 3px;
            background: white;
            color: black;
        }
        button:hover {
            background: #f0f0f0;
        }
        input {
            padding: 8px;
            width: 250px;
            font-size: 16px;
        }
    </style>
</head>
<body>
    <h2>чеклист</h2>
    <input type="text" id="input" placeholder="Введите дело и нажмите Enter">
    <ul id="list"></ul>

    <script>
        let input = document.getElementById('input');
        let list = document.getElementById('list');

        // Функция создания нового дела
        function createTask(text) {
            let li = document.createElement('li');
            // Текст дела
            let span = document.createElement('span');
            span.textContent = text;
            span.className = 'task-text';
            // Кнопка "Сделано"
            let doneBtn = document.createElement('button');
            doneBtn.textContent = 'Сделано';
            doneBtn.onclick = function() {
                span.classList.toggle('done');
            };
            // Кнопка "Удалить"
            let deleteBtn = document.createElement('button');
            deleteBtn.textContent = 'Удалить';
            deleteBtn.onclick = function() {
                li.remove();
            };
            li.appendChild(span);
            li.appendChild(doneBtn);
            li.appendChild(deleteBtn);
            
            return li;
        }
        // Добавление нового дела при нажатии Enter
        input.addEventListener('keypress', function(event) {
            if (event.key == 'Enter') {
                let text = input.value.trim();
                if (text !== '') {
                    let newTask = createTask(text);
                    list.appendChild(newTask); // добавляем в конец (снизу)
                    input.value = '';
                }
            }
        });
    </script>
</body>
</html>
