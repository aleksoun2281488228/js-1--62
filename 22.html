<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Чеклист</title>
    <style>
        #list span {
            margin-right: 5px;
        }
        #list .remove, #list .mark {
            color: blue;
            cursor: pointer;
        }
        #list .remove:hover, #list .mark:hover {
            text-decoration: underline;
        }
        .done {
            text-decoration: line-through;
        }
        .edit-input {
            width: 200px;
            padding: 2px 5px;
            font-size: 14px;
        }
        body {
            text-align: center;
            font-family: Arial, sans-serif;
        }
        #input, #list {
            display: inline-block;
        }
        #list {
            padding: 0;
            list-style-type: none;
            text-align: left;
        }
        #list li {
            margin: 10px 0;
        }
        input {
            padding: 8px;
            width: 250px;
            font-size: 16px;
        }
    </style>
</head>
<body>
    <h2>Чеклист</h2>
    <input id="input" placeholder="Введите дело и нажмите Enter">
    <ul id="list"></ul>

    <script>
        let input = document.querySelector('#input');
        let list = document.querySelector('#list');

        input.addEventListener('keypress', function(event) {
            if (event.key == 'Enter') {
                let li = document.createElement('li');
                
                let task = document.createElement('span');
                task.classList.add('task');
                task.textContent = this.value;
                
                // Редактирование по двойному клику
                task.addEventListener('dblclick', function() {
                    // Сохраняем текущий текст
                    let oldText = task.textContent;
                    
                    // Создаём input
                    let editInput = document.createElement('input');
                    editInput.type = 'text';
                    editInput.value = oldText;
                    editInput.classList.add('edit-input');
                    
                    // Заменяем span на input
                    task.replaceWith(editInput);
                    
                    // Фокусируемся на input
                    editInput.focus();
                    
                    // Сохраняем изменения по нажатию Enter
                    editInput.addEventListener('keypress', function(e) {
                        if (e.key == 'Enter') {
                            let newText = editInput.value.trim();
                            if (newText !== '') {
                                task.textContent = newText;
                            } else {
                                task.textContent = oldText;
                            }
                            // Заменяем input обратно на span
                            editInput.replaceWith(task);
                        }
                    });
                    
                    // Если кликнули вне input или нажали Escape — отменяем
                    editInput.addEventListener('blur', function() {
                        editInput.replaceWith(task);
                    });
                });
                
                li.appendChild(task);
                
                let remove = document.createElement('span');
                remove.classList.add('remove');
                remove.textContent = 'удалить';
                remove.addEventListener('click', function() {
                    li.remove();
                });
                li.appendChild(remove);
                
                let mark = document.createElement('span');
                mark.classList.add('mark');
                mark.textContent = 'сделано';
                mark.addEventListener('click', function() {
                    task.classList.toggle('done');
                });
                li.appendChild(mark);
                
                list.appendChild(li);
                
                this.value = '';
            }
        });
    </script>
</body>
</html>
