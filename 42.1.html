<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Крестики-нолики</title>
    <style>
             #field td {
	width: 50px;
	height: 50px;
	border: 1px solid black;
	text-align: center;
	font-weight: bold;
}
    </style>
</head>
<body>

<table id="field">
    <tr>
        <td></td>
        <td></td>
        <td></td>
    </tr>
    <tr>
        <td></td>
        <td></td>
        <td></td>
    </tr>
    <tr>
        <td></td>
        <td></td>
        <td></td>
    </tr>
</table>

<script>
function start(cells) {
    for (let i = 0; i < cells.length; i++) {
        cells[i].addEventListener('click', function() {
            // Проверяем, пустая ли ячейка
            if (this.textContent === '') {
                this.textContent = 'X';
            }
        });
    }
}

let cells = document.querySelectorAll('#field td');
start(cells);
</script>

</body>
</html>
