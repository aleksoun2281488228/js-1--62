<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Игра смена цветов</title>
    <style>
        #field td {
            width: 50px;
            height: 50px;
            border: 1px solid black;
            text-align: center;
            font-weight: bold;
        }
        table {
            margin: 20px auto;
            border-collapse: collapse;
        }
        .info {
            text-align: center;
            margin: 10px;
            font-size: 18px;
        }
        button {
            display: block;
            margin: 10px auto;
            padding: 5px 15px;
            cursor: pointer;
        }
    </style>
</head>
<body>

<table id="field"></table>
<div class="info" id="info"></div>
<button id="reset">Сбросить</button>

<script>
let rows = 3;
let cols = 3;

let field = document.getElementById('field');

// Создаём таблицу
function createTable() {
    field.innerHTML = '';
    
    for (let i = 0; i < rows; i++) {
        let tr = document.createElement('tr');
        
        for (let j = 0; j < cols; j++) {
            let td = document.createElement('td');
            tr.appendChild(td);
        }
        
        field.appendChild(tr);
    }
}

createTable();
</script>

</body>
</html>
