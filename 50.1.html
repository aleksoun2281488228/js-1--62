<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Игра</title>
    <style>
        td {
            width: 50px;
            height: 50px;
            border: 1px solid black;
            cursor: pointer;
        }
        .red { background: red; }
        .green { background: green; }
        .blue { background: blue; }
        table { margin: 20px auto; }
        div { text-align: center; margin: 10px; }
    </style>
</head>
<body>

<table id="field"></table>
<div id="msg"></div>
<button onclick="location.reload()">Заново</button>

<script>
let colors = ['red', 'green', 'blue'];
let clicks = 0;

function next(c) {
    let i = colors.indexOf(c);
    return colors[(i + 1) % 3];
}

function check() {
    let all = document.querySelectorAll('#field td');
    let first = all[0].className;
    for (let i = 1; i < all.length; i++) {
        if (all[i].className !== first) return false;
    }
    return true;
}

let field = document.getElementById('field');

for (let i = 0; i < 3; i++) {
    let tr = document.createElement('tr');
    for (let j = 0; j < 3; j++) {
        let td = document.createElement('td');
        td.className = colors[Math.floor(Math.random() * 3)];
        td.onclick = function() {
            if (this.parentElement.parentElement.parentElement) {
                this.className = next(this.className);
                clicks++;
                if (check()) {
                    document.getElementById('msg').textContent = 'Победа за ' + clicks + ' кликов!';
                    this.parentElement.parentElement.parentElement.onclick = null;
                }
            }
        };
        tr.appendChild(td);
    }
    field.appendChild(tr);
}
</script>

</body>
</html>
